<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BattleZone Airsoft{% endblock %}</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ========== CORES BATTLEZONE ========== */
        :root {
            --laranja: #FF6B00;
            --laranja-escuro: #CC5500;
            --preto: #1A1A1A;
            --cinza-escuro: #2D2D2D;
            --cinza-claro: #3D3D3D;
        }
        
        body {
            background-color: var(--preto);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-top: 80px;
        }
        
        /* Navbar */
        .navbar {
            background-color: var(--cinza-escuro) !important;
            border-bottom: 3px solid var(--laranja);
        }
        
        .navbar-brand {
            color: var(--laranja) !important;
            font-weight: bold;
            font-size: 24px;
        }
        
        .nav-link {
            color: #ffffff !important;
        }
        
        .nav-link:hover {
            color: var(--laranja) !important;
        }
        
        /* Botões */
        .btn-laranja {
            background-color: var(--laranja);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .btn-laranja:hover {
            background-color: var(--laranja-escuro);
            color: white;
            transform: translateY(-2px);
        }
        
        .btn-outline-laranja {
            border: 2px solid var(--laranja);
            color: var(--laranja);
            background: transparent;
            padding: 8px 20px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .btn-outline-laranja:hover {
            background-color: var(--laranja);
            color: white;
            transform: translateY(-2px);
        }
        
        /* Cards */
        .card {
            background-color: var(--cinza-escuro);
            border: none;
            border-radius: 10px;
            transition: transform 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(255, 107, 0, 0.3);
        }
        
        .card-header {
            background-color: var(--preto);
            color: var(--laranja);
            border-bottom: 2px solid var(--laranja);
            font-weight: bold;
        }
        
        .text-laranja {
            color: var(--laranja) !important;
        }
        
        .bg-laranja {
            background-color: var(--laranja) !important;
        }
        
        /* Hero Section */
        .hero-section {
            background: linear-gradient(135deg, var(--preto), var(--laranja-escuro));
            min-height: 90vh;
            display: flex;
            align-items: center;
            margin-top: -80px;
            position: relative;
            z-index: 1;
        }
        
        .hero-title {
            font-size: 4rem;
            font-weight: 800;
            color: var(--laranja);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .hero-subtitle {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: #fff;
        }
        
        /* Media Placeholder */
        .media-placeholder {
            background: linear-gradient(45deg, var(--cinza-escuro), var(--preto));
            border: 3px dashed var(--laranja);
            border-radius: 20px;
            padding: 60px 20px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .media-placeholder:hover {
            border-color: #fff;
            transform: scale(1.02);
        }
        
        .media-placeholder i {
            font-size: 4rem;
            color: var(--laranja);
            margin-bottom: 20px;
        }
        
        /* Footer */
        .footer {
            background-color: var(--cinza-escuro);
            color: #aaa;
            padding: 40px 0;
            border-top: 2px solid var(--laranja);
        }
        
        .footer a {
            color: #fff;
            text-decoration: none;
        }
        
        .footer a:hover {
            color: var(--laranja);
        }
        
        /* Tabelas de Preços */
        .price-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .price-table th {
            background-color: var(--preto);
            color: var(--laranja);
            padding: 12px;
            font-weight: 600;
            border-bottom: 2px solid var(--laranja);
        }
        
        .price-table td {
            padding: 10px;
            border-bottom: 1px solid var(--cinza-claro);
        }
        
        .price-table tr:hover td {
            background-color: var(--cinza-escuro);
        }
        
        /* Abas de preços */
        .nav-tabs .nav-link {
            color: white;
            border: none;
            padding: 12px 25px;
            margin: 0 5px;
        }
        
        .nav-tabs .nav-link.active {
            background-color: var(--laranja);
            color: white;
            border: none;
        }
        
        .nav-tabs .nav-link:hover {
            border-color: var(--laranja);
            color: var(--laranja);
        }
        
        /* Cards de preços */
        .border-warning {
            border: 2px solid #ffc107 !important;
        }
        
        /* Seções com âncora corrigida */
        section {
            scroll-margin-top: 80px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}#sobre">
                <i class="fas fa-crosshairs me-2"></i>BATTLEZONE
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}#partidas-hoje">Partidas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}#horarios">Horários</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}#sobre">Sobre</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}#precos">Preços</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}#regras">Regras</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('calendario_publico') }}">Calendário</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}#contato">Contato</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a href="{{ url_for('auth.login') }}" class="btn btn-outline-laranja">Entrar</a>
                    </li>
                    <li class="nav-item">
                        <a href="{{ url_for('auth.criar_conta') }}" class="btn btn-laranja">Criar conta</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <p>&copy; 2024 BattleZone Airsoft. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Smooth scroll com offset para navbar fixa
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    const offset = 80;
                    const targetPosition = target.getBoundingClientRect().top + window.pageYOffset - offset;
                    window.scrollTo({
                        top: targetPosition,
                        behavior: 'smooth'
                    });
                }
            });
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
